name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore tests/FlappyBird.Tests/FlappyBird.Tests.csproj

      - name: Test
        run: dotnet test tests/FlappyBird.Tests/FlappyBird.Tests.csproj --no-restore --logger "console;verbosity=normal"

  build-android:
    name: Android AAB
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: "4.6.2"
      EXPORT_NAME: "FlappyBird"
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Godot (Mono)
        run: |
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_mono_linux_x86_64.zip" \
            -O godot.zip
          unzip -q godot.zip
          GODOT_DIR="${HOME}/.local/share/godot_bin"
          mkdir -p "${GODOT_DIR}"
          cp -r "Godot_v${GODOT_VERSION}-stable_mono_linux_x86_64/." "${GODOT_DIR}/"
          mv "${GODOT_DIR}/Godot_v${GODOT_VERSION}-stable_mono_linux.x86_64" "${GODOT_DIR}/godot"
          chmod +x "${GODOT_DIR}/godot"
          echo "${GODOT_DIR}" >> "${GITHUB_PATH}"

      - name: Install Godot export templates
        run: |
          TEMPLATES_DIR="${HOME}/.local/share/godot/export_templates/${GODOT_VERSION}.stable.mono"
          mkdir -p "${TEMPLATES_DIR}"
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_mono_export_templates.tpz" \
            -O templates.tpz
          unzip -q templates.tpz -d templates_extracted
          mv templates_extracted/templates/* "${TEMPLATES_DIR}/"

      - name: Install Android build template
        run: |
          TEMPLATES_DIR="${HOME}/.local/share/godot/export_templates/${GODOT_VERSION}.stable.mono"
          mkdir -p android/build
          unzip -q "${TEMPLATES_DIR}/android_source.zip" -d android/build

      - name: Configure Godot Android SDK path
        run: |
          mkdir -p "${HOME}/.config/godot"
          printf '[gd_resource type="EditorSettings" format=3 uid=""]\n\n[resource]\nexport/android/android_sdk_path = "%s"\n' \
            "${ANDROID_SDK_ROOT}" \
            > "${HOME}/.config/godot/editor_settings-4.tres"

      - name: Import project
        run: godot --headless --import || true

      - name: Create output directory
        run: mkdir -p builds/android

      - name: Export Android AAB (debug)
        run: godot --headless --export-debug "Android" "builds/android/${EXPORT_NAME}.aab"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: builds/android/${{ env.EXPORT_NAME }}.aab
          if-no-files-found: error
