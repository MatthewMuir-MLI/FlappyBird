name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore tests/FlappyBird.Tests/FlappyBird.Tests.csproj
      - name: Test
        run: dotnet test tests/FlappyBird.Tests/FlappyBird.Tests.csproj --no-restore --logger "console;verbosity=detailed"

  screenshot:
    name: Headless gameplay screenshot
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: 4.6.2-stable
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Godot Mono (Linux)
        run: |
          set -e
          curl -fsSL -o godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_mono_linux_x86_64.zip"
          unzip -q godot.zip
          BIN_DIR="$(pwd)/Godot_v${GODOT_VERSION}_mono_linux_x86_64"
          chmod +x "${BIN_DIR}/Godot_v${GODOT_VERSION}_mono_linux.x86_64"
          sudo ln -sf "${BIN_DIR}/Godot_v${GODOT_VERSION}_mono_linux.x86_64" /usr/local/bin/godot
          godot --version

      - name: Install xvfb and Vulkan software renderer
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends xvfb mesa-vulkan-drivers libvulkan1

      - name: Import Godot project
        run: godot --headless --import

      - name: Build C# game project
        run: dotnet build FlappyBird.csproj --configuration Debug

      - name: Capture Main scene screenshot
        run: |
          set -e
          mkdir -p artifacts
          OUT="${GITHUB_WORKSPACE}/artifacts/main-scene.png"
          xvfb-run -a -s "-screen 0 1080x1920x24" \
            godot --rendering-driver vulkan --quit-after 240 res://scenes/Main.tscn \
              -- --capture-screenshot "${OUT}"
          ls -la artifacts/
          test -s "${OUT}"

      - name: Upload screenshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gameplay-screenshot
          path: artifacts/main-scene.png
          if-no-files-found: error

  build-android:
    name: Android AAB (debug)
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: 4.6.2-stable
      EXPORT_NAME: FlappyBird
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Godot Mono (Linux)
        run: |
          set -e
          curl -fsSL -o godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_mono_linux_x86_64.zip"
          unzip -q godot.zip
          BIN_DIR="$(pwd)/Godot_v${GODOT_VERSION}_mono_linux_x86_64"
          chmod +x "${BIN_DIR}/Godot_v${GODOT_VERSION}_mono_linux.x86_64"
          sudo ln -sf "${BIN_DIR}/Godot_v${GODOT_VERSION}_mono_linux.x86_64" /usr/local/bin/godot
          godot --version

      - name: Install Godot Android export templates
        run: |
          set -e
          TEMPLATES_DIR="${HOME}/.local/share/godot/export_templates/${GODOT_VERSION/-stable/.stable}.mono"
          mkdir -p "${TEMPLATES_DIR}"
          curl -fsSL -o templates.tpz "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_mono_export_templates.tpz"
          unzip -q templates.tpz
          # The .tpz archive expands to a top-level "templates/" directory
          mv templates/* "${TEMPLATES_DIR}/"
          ls "${TEMPLATES_DIR}"

      - name: Extract Android build template into project
        run: |
          set -e
          TEMPLATES_DIR="${HOME}/.local/share/godot/export_templates/${GODOT_VERSION/-stable/.stable}.mono"
          mkdir -p android/build
          unzip -qo "${TEMPLATES_DIR}/android_source.zip" -d android/build
          test -f android/build/build.gradle

      - name: Configure Godot Editor Settings (Java SDK + Android SDK paths)
        run: |
          set -e
          : "${ANDROID_SDK_ROOT:?ANDROID_SDK_ROOT is not set}"
          : "${JAVA_HOME:?JAVA_HOME is not set}"
          SETTINGS_DIR="${HOME}/.config/godot"
          SETTINGS_FILE="${SETTINGS_DIR}/editor_settings-4.6.tres"
          mkdir -p "${SETTINGS_DIR}"
          cat > "${SETTINGS_FILE}" <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "${ANDROID_SDK_ROOT}"
          export/android/java_sdk_path = "${JAVA_HOME}"
          EOF
          echo "--- ${SETTINGS_FILE} ---"
          cat "${SETTINGS_FILE}"
          echo "--- Validating runner-side Android SDK at ${ANDROID_SDK_ROOT} ---"
          ls "${ANDROID_SDK_ROOT}/platform-tools" | head -5
          ls "${ANDROID_SDK_ROOT}/build-tools" | tail -3
          echo "--- Validating JDK at ${JAVA_HOME} ---"
          "${JAVA_HOME}/bin/java" -version

      - name: Import Godot project (priming caches)
        run: godot --headless --import

      - name: Build C# game project
        run: dotnet build FlappyBird.csproj --configuration Debug

      - name: Export Android AAB (debug)
        run: |
          set -e
          mkdir -p builds/android
          OUT="${GITHUB_WORKSPACE}/builds/android/${EXPORT_NAME}.aab"
          godot --headless --verbose --export-debug "Android" "${OUT}"
          test -s "${OUT}"
          ls -la builds/android/

      - name: Upload AAB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-debug
          path: builds/android/${{ env.EXPORT_NAME }}.aab
          if-no-files-found: error
